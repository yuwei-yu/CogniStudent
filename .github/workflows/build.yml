name: Build Windows EXE

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest # Windows 运行器

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 用 PyInstaller 打包成单个 exe
        run: |
          pyinstaller --onefile --windowed --name "ExcelProcessor" main.py

      - name: 上传 exe 为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ExcelProcessor-Windows
          path: dist/ExcelProcessor.exe
